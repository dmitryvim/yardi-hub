services:
  traefik:
    image: traefik:v3.6
    pull_policy: always
    restart: always
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - yardi

  postgres:
    image: postgres:17-alpine
    pull_policy: always
    restart: always
    environment:
      POSTGRES_DB: yardi
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - yardi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/dmitryvim/yardi-hub:migrate
    pull_policy: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/yardi
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - yardi
    restart: "no"

  hub:
    image: ghcr.io/dmitryvim/yardi-hub:latest
    pull_policy: always
    restart: always
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: https://yardi.dmitrylabs.com
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/yardi
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - yardi
    labels:
      - "traefik.enable=true"
      # HTTPS
      - "traefik.http.routers.hub.rule=Host(`yardi.dmitrylabs.com`)"
      - "traefik.http.routers.hub.entrypoints=websecure"
      - "traefik.http.routers.hub.tls.certresolver=le"
      - "traefik.http.services.hub.loadbalancer.server.port=3000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.hub-http.rule=Host(`yardi.dmitrylabs.com`)"
      - "traefik.http.routers.hub-http.entrypoints=web"
      - "traefik.http.routers.hub-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"

  tanki2:
    image: ghcr.io/dmitryvim/yardi-tanki2:latest
    pull_policy: always
    restart: always
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
    networks:
      - yardi
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tanki2.rule=Host(`yardi.dmitrylabs.com`) && PathPrefix(`/g/tanki2`)"
      - "traefik.http.routers.tanki2.entrypoints=websecure"
      - "traefik.http.routers.tanki2.tls.certresolver=le"
      - "traefik.http.services.tanki2.loadbalancer.server.port=3000"

  dng:
    image: ghcr.io/dmitryvim/yardi-dng:latest
    pull_policy: always
    restart: always
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
    networks:
      - yardi
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dng.rule=Host(`yardi.dmitrylabs.com`) && PathPrefix(`/g/ducks-and-geese`)"
      - "traefik.http.routers.dng.entrypoints=websecure"
      - "traefik.http.routers.dng.tls.certresolver=le"
      - "traefik.http.services.dng.loadbalancer.server.port=3000"

volumes:
  letsencrypt:
  pgdata:

networks:
  yardi:
    driver: bridge
